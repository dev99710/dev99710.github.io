<!DOCTYPE html>
<html>
  <head>
    <title>Login Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
      }
      
      #login-form {
        max-width: 500px;
        margin: 0 auto;
        background-color: #fff;
        padding: 30px;
        border-radius: 5px;
        box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.2);
      }
      
      h1 {
        text-align: center;
        color: #333;
      }
      
      input[type="text"], input[type="password"] 
      {
        display: block;
        width: 100%;
        margin-bottom: 10px;
        padding: 10px;
        font-size: 16px;
        border-radius: 5px;
        border: none;
      }
      
      input[type="submit"] {
        display: block;
        margin: 20px auto 0;
        padding: 10px 20px;
        background-color: #333;
        color: #fff;
        font-size: 16px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
      }
      
      input[type="submit"]:hover {
        background-color: #555;
      }
      
      label {
        display: block;
        margin-bottom: 5px;
        font-size: 16px;
        color: #333;
      }
      #logo {
        display: block;
        margin: 0 auto 30px;
        width: 150px;
      }
      #background-image {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }
      
    </style>
    <script>
        function login() {
          window.location.href = "college.html";
        }
      </script>
  </head>
  <body>
    <img id="background-image" src="519127-academic-baltimore.jpg">
    <div id="login-form">
      <img id="logo" src="3218565.jpg">
      <h1>Login</h1>
      <form>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <input type="submit" value="Submit" onclick="login()">
      </form>
    </div>
  </body>
</html>
